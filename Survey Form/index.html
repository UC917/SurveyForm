<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>调查问卷</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <header>
        <h1 id="title">调查问卷</h1>
        <p id="description">欢迎来到FreeCodeCamp的调查问卷</p>
    </header>
    <form id="survey-form">
        <div class="form-group">
            <label for="name" id="name-label">姓名:</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="请输入您的名字" minlength="3" maxlength="20" required>
        </div>

        <div class="form-group">
            <label for="email" id="email-label">邮箱:</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="请输入您的邮箱" minlength="3" maxlength="64" required>
        </div>

        <div class="form-group">
            <label for="number" id="number-label">年龄:</label>
            <input type="number" id="number" name="age" class="form-control" placeholder="请输入您的年龄" min="13" max="99" required>
        </div>

        <div class="form-group">
            <label for="dropdown">哪个选项最能描述您当前的职业？</label>
            <select id="dropdown" name="role" class="form-control">
                <option disabled selected value>请选择</option>
                <option value="学生">学生</option>
                <option value="全职工作者">全职工作者</option>
                <option value="全日制学习">全日制学习</option>
                <option value="不想说">不想说</option>
                <option value="其他">其他</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fcc-feature">您最喜欢FCC的哪个功能？</label>
            <select id="fcc-feature" name="fcc-feature" class="form-control">
                <option disabled selected value>选择一个选项</option>
                <option value="挑战">挑战</option>
                <option value="项目">项目</option>
                <option value="开源">开源</option>
                <option value="社区">社区</option>
            </select>
        </div>

        <div class="form-group">
            <p>您会向朋友推荐这个网站吗？</p>
            <label><input type="radio" name="recommend" value="yes" class="input-radio" required checked> 是的，我会！</label>
            <label><input type="radio" name="recommend" value="no" class="input-radio"> 不，我不会！</label>
            <label><input type="radio" name="recommend" value="maybe" class="input-radio"> 我会考虑，但有可能也不会。</label>
        </div>

        <div class="form-group">
            <p>您希望看到哪些内容的反馈?<span>（可以勾选单个或者多个选项）</span></p>
            <label><input type="checkbox" name="feedback" value="frontend-project" class="input-checkbox"> 前端项目</label>
            <label><input type="checkbox" name="feedback" value="backend-project" class="input-checkbox"> 后端项目</label>
            <label><input type="checkbox" name="feedback" value="data-visualization" class="input-checkbox"> 数据可视化</label>
            <label><input type="checkbox" name="feedback" value="challenge" class="input-checkbox"> 挑战</label>
            <label><input type="checkbox" name="feedback" value="os-community" class="input-checkbox"> 开源社区</label>
            <label><input type="checkbox" name="feedback" value="gitter-help-room" class="input-checkbox"> Gitter帮助室</label>
            <label><input type="checkbox" name="feedback" value="video" class="input-checkbox"> 视频</label>
            <label><input type="checkbox" name="feedback" value="city-gathering" class="input-checkbox"> 城市聚会</label>
            <label><input type="checkbox" name="feedback" value="wikipedia" class="input-checkbox"> 维基百科</label>
            <label><input type="checkbox" name="feedback" value="forum" class="input-checkbox"> 论坛</label>
            <label><input type="checkbox" name="feedback" value="additional-courses" class="input-checkbox"> 附加课程</label>
        </div>

        <div class="form-group">
            <label for="message">您有什么建议或想法吗？</label>
            <textarea id="message" name="comment" class="input-textarea" placeholder="请输入您的建议或想法" minlength="10" maxlength="500" required></textarea>
        </div>

        <button id="submit" type="submit" class="btn btn-primary">提交</button>
    </form>
</main>
</body>
</html>
